name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.get-version.outputs.version }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Open Field Studio ${version}`,
              body: `## What's New in ${version}\n\nOpen-source tool voor inspectie, oplevering & kwaliteitsborging bij bouwprojecten.\n\n### Downloads\n- **Windows (System)**: Download the \`*_x64-setup.exe\` installer for system-wide installation (requires admin)\n- **Windows (User)**: Download the \`*_x64_user-setup.exe\` installer for current user only (no admin required)\n- **Linux**: Download the \`.deb\` package or \`.AppImage\`\n- **Android**: Download the \`.apk\` file\n\n### Features\n- Tickets & gebrekenregistratie op plattegronden\n- Checklist-inspecties met 10 templates (pass/fail en NEN 2767)\n- Energielabel opname — volledige NTA 8800 data-verzameling\n- Monument inspectie — constructie, interieur, vocht/schade\n- Oplevering met proces-verbaal en digitale handtekeningen\n- Dashboard met real-time statistieken\n- Camera-integratie voor foto-opname op locatie\n- 4 talen: Nederlands, Engels, Duits, Frans\n- HTML/PDF rapporten`,
              draft: true,
              prerelease: false
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'linux'
          - platform: 'windows-latest'
            args: ''
            target: 'windows-system'
          - platform: 'windows-latest'
            args: ''
            target: 'windows-user'

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Set user install mode
        if: matrix.target == 'windows-user'
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          if (-not $conf.bundle.PSObject.Properties['windows']) {
            $conf.bundle | Add-Member -NotePropertyName 'windows' -NotePropertyValue @{}
          }
          if (-not $conf.bundle.windows.PSObject.Properties['nsis']) {
            $conf.bundle.windows | Add-Member -NotePropertyName 'nsis' -NotePropertyValue @{}
          }
          $conf.bundle.windows.nsis.installMode = "currentUser"
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri app (with release upload)
        if: matrix.target != 'windows-user'
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true

      - name: Build Tauri app (user installer)
        if: matrix.target == 'windows-user'
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Authenticode sign Windows installer
        if: contains(matrix.target, 'windows')
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}/src-tauri/target/release/bundle/nsis
          files-folder-filter: exe
          files-folder-depth: 1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-sign updater artifacts after Authenticode signing
        if: matrix.target == 'windows-system' && env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $NSIS_DIR = "src-tauri/target/release/bundle/nsis"

          $EXE = Get-ChildItem "$NSIS_DIR/*-setup.exe" | Select-Object -First 1
          $ZIP = Get-ChildItem "$NSIS_DIR/*.nsis.zip" | Select-Object -First 1

          Write-Host "Signed exe: $($EXE.Name)"
          Write-Host "Old zip: $($ZIP.Name)"

          # Re-create .nsis.zip with the Authenticode-signed exe
          $ZIP_PATH = $ZIP.FullName
          Remove-Item $ZIP_PATH
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::Open($ZIP_PATH, 'Create')
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($archive, $EXE.FullName, $EXE.Name, [System.IO.Compression.CompressionLevel]::Optimal)
          $archive.Dispose()

          # Re-generate updater signatures
          npx tauri signer sign "$($EXE.FullName)" --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          npx tauri signer sign "$($ZIP.FullName)" --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          $EXE_SIG = Get-Content "$($EXE.FullName).sig" -Raw
          $ZIP_SIG = Get-Content "$($ZIP.FullName).sig" -Raw

          # Download latest.json, update Windows signatures
          gh release download $VERSION --pattern "latest.json" --output latest.json --clobber --repo "${{ github.repository }}"
          $latest = Get-Content latest.json -Raw | ConvertFrom-Json

          foreach ($key in @('windows-x86_64')) {
            if ($latest.platforms.PSObject.Properties[$key]) {
              $latest.platforms.$key.signature = $ZIP_SIG
              Write-Host "Updated signature for $key"
            }
          }
          foreach ($key in @('windows-x86_64-nsis')) {
            if ($latest.platforms.PSObject.Properties[$key]) {
              $latest.platforms.$key.signature = $EXE_SIG
              Write-Host "Updated signature for $key"
            }
          }

          $latest | ConvertTo-Json -Depth 10 | Set-Content latest.json -NoNewline

          # Re-upload all modified files
          gh release upload $VERSION "$($EXE.FullName)" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($EXE.FullName).sig" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($ZIP.FullName)" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($ZIP.FullName).sig" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION latest.json --clobber --repo "${{ github.repository }}"

          Write-Host "All Windows artifacts re-uploaded with correct signatures"

      - name: Upload user installer to release
        if: matrix.target == 'windows-user'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $NSIS_DIR = "src-tauri/target/release/bundle/nsis"
          $EXE = Get-ChildItem "$NSIS_DIR/*-setup.exe" | Select-Object -First 1
          $NEW_NAME = $EXE.Name -replace '_x64-setup\.exe$', '_x64_user-setup.exe'
          $NEW_PATH = Join-Path $EXE.DirectoryName $NEW_NAME
          Rename-Item $EXE.FullName $NEW_PATH
          gh release upload $VERSION "$NEW_PATH" --clobber --repo "${{ github.repository }}"
          Write-Host "Uploaded user installer: $NEW_NAME"

  build-android:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            android-rust-

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Build Android APK
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Sign APK
        id: sign-apk
        run: |
          UNSIGNED_APK=$(find src-tauri/gen/android -name "*-unsigned.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found"
            exit 1
          fi
          echo "Found unsigned APK: $UNSIGNED_APK"
          APK_DIR=$(dirname "$UNSIGNED_APK")

          keytool -genkeypair -v \
            -keystore "$APK_DIR/release.keystore" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass openfieldstudio -keypass openfieldstudio \
            -dname "CN=Open Field Studio, O=OpenAEC Foundation, L=Unknown, ST=Unknown, C=US"

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"

          ALIGNED_APK="$APK_DIR/app-universal-release-aligned.apk"
          "${BUILD_TOOLS}zipalign" -v 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          SIGNED_APK="$APK_DIR/open-field-studio-release.apk"
          "${BUILD_TOOLS}apksigner" sign \
            --ks "$APK_DIR/release.keystore" \
            --ks-key-alias release \
            --ks-pass pass:openfieldstudio \
            --key-pass pass:openfieldstudio \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "${BUILD_TOOLS}apksigner" verify --verbose "$SIGNED_APK"
          echo "signed_apk=$SIGNED_APK" >> $GITHUB_OUTPUT
          echo "Signed APK: $SIGNED_APK"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/**/open-field-studio-release.apk
          if-no-files-found: warn

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          echo "Looking for signed APK..."
          find src-tauri/gen/android -name "*.apk" -type f
          SIGNED_APK=$(find src-tauri/gen/android -name "open-field-studio-release.apk" -type f | head -1)
          if [ -z "$SIGNED_APK" ]; then
            echo "ERROR: No signed APK found!"
            exit 1
          fi
          echo "Uploading: $SIGNED_APK"
          ls -la "$SIGNED_APK"
          gh release upload "$VERSION" "$SIGNED_APK" --clobber --repo "${{ github.repository }}"
          echo "APK uploaded successfully"

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build, build-android]

    steps:
      - name: Publish release
        id: publish-release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            });
